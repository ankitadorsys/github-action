# =====================================================================
# Full CI/CD Pipeline
# =====================================================================
# This is the unified pipeline for build, infrastructure, and deployment.
#
# How it works:
#   - On EVERY push/PR:    Matrix build runs (Java 21 + 25)
#   - On PRs to main:      + Terraform plan (posted as PR comment)
#   - On merge to main:    + Build-for-deploy (uploads JAR)
#                          + Terraform apply + deploy to CF
#
# Key concepts demonstrated (Phase 5 + Phase 6):
#   - Reusable workflows (`workflow_call`) — build logic in reusable-build.yml
#   - Matrix strategy — test across Java 21 and 25 in parallel
#   - Multi-job workflows with `needs:` dependencies
#   - Conditional execution with `if:` expressions
#   - Artifact passing between jobs (JAR file)
#   - Terraform state stored on a dedicated git branch
#   - Posting Terraform plan output as a PR comment
#   - GitHub Environments for deployment protection
#
# Phase 7 changes:
#   - Spring Boot 3.4.3 → 4.0.3, Java 17 → 21 (compile target)
#   - CI matrix: [17, 21] → [21, 25] (21 is LTS + CF runtime, 25 tests forward compat)
#   - setup-java action: v4 → v5
# =====================================================================

name: CI/CD Pipeline

# -----------------------------------------------------------------
# TRIGGERS
# -----------------------------------------------------------------
on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

# -----------------------------------------------------------------
# PERMISSIONS
# -----------------------------------------------------------------
permissions:
  contents: write
  pull-requests: write

# -----------------------------------------------------------------
# WORKFLOW-LEVEL ENVIRONMENT VARIABLES
# -----------------------------------------------------------------
env:
  JAR_NAME: github-action-demo-0.0.1-SNAPSHOT.jar
  TF_VERSION: '1.5.7'

jobs:

  # =================================================================
  # JOB 1: MATRIX BUILD (Java 21 + 25)
  # =================================================================
  # Calls the reusable build workflow for EACH Java version in the matrix.
  # This spawns 2 parallel jobs: one for Java 21, one for Java 25.
  # Purpose: verify the code compiles and tests pass on multiple versions.
  #
  # Matrix strategy:
  #   strategy.matrix defines a list of values. GitHub Actions creates
  #   one job instance per combination. With [21, 25], we get 2 jobs.
  #   If we had [21, 25] x [ubuntu, windows], we'd get 4 jobs.
  #
  #   fail-fast: false means if Java 21 fails, Java 25 still runs.
  #   (Default is true — one failure cancels all other matrix jobs.)
  #
  # Why 21 + 25?
  #   - 21: LTS, matches CF runtime (SAP BTP buildpack max is 21)
  #   - 25: Latest LTS (Sep 2025), tests forward compatibility
  #   Previously was [17, 21] — updated in Phase 7 for Boot 4.0.3.
  # =================================================================
  build-matrix:
    name: Build (Java ${{ matrix.java-version }})
    strategy:
      fail-fast: false
      matrix:
        java-version: ['21', '25']

    # `uses:` calls the reusable workflow instead of defining steps inline.
    # This is like calling a function: reusable-build(java-version='21')
    uses: ./.github/workflows/reusable-build.yml
    with:
      java-version: ${{ matrix.java-version }}
      upload-artifact: false

  # =================================================================
  # JOB 2: BUILD FOR DEPLOY (Java 21, with artifact)
  # =================================================================
  # A separate build that uploads the JAR artifact for the deploy job.
  # Only runs on push to main — no point uploading artifacts for PRs
  # or feature branches since we don't deploy from those.
  #
  # Why Java 21 specifically? SAP BTP CF's Java buildpack only supports
  # up to JRE 21. We compile with 21 and run on 21 — no mismatch.
  #
  # Why a separate job? The matrix build (Job 1) runs Java 21 + 25
  # for testing, but we can't selectively upload artifacts from one
  # matrix entry. So we have a dedicated "build for deployment" job.
  # =================================================================
  build-deploy:
    name: Build for Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-build.yml
    with:
      java-version: '21'
      upload-artifact: true

  # =================================================================
  # JOB 3: TERRAFORM PLAN (PRs only)
  # =================================================================
  # Runs only on pull requests targeting main.
  # Shows what infrastructure changes would happen if this PR is merged.
  # Posts the plan output as a PR comment for review.
  # =================================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-matrix
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Terraform state
        run: |
          git fetch origin terraform-state --depth=1
          git show origin/terraform-state:terraform.tfstate > terraform/terraform.tfstate 2>/dev/null || echo "No existing state found — will create fresh"
          if [ -f terraform/terraform.tfstate ]; then
            echo "State file restored ($(wc -c < terraform/terraform.tfstate) bytes)"
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          mkdir -p ../backend/target
          touch ../backend/target/${{ env.JAR_NAME }}
          mkdir -p ../frontend/dist/frontend/browser
          touch ../frontend/dist/frontend/browser/index.html
          cp ../frontend/Staticfile ../frontend/dist/frontend/browser/Staticfile

          terraform plan \
            -var="cf_username=${{ secrets.CF_USERNAME }}" \
            -var="cf_password=${{ secrets.CF_PASSWORD }}" \
            -input=false \
            -no-color \
            -detailed-exitcode \
            2>&1 || true
        env:
          TF_IN_AUTOMATION: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = `${{ steps.plan.outputs.stdout }}`;
            const planError = `${{ steps.plan.outputs.stderr }}`;

            const maxLen = 60000;
            const plan = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (truncated)'
              : planOutput;

            const body = `### Terraform Plan Output
            
            <details>
            <summary>Click to expand</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>

            ${planError ? `**Warnings/Errors:**\n\`\`\`\n${planError}\n\`\`\`` : ''}

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Terraform Plan Output')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # =================================================================
  # JOB 4: TERRAFORM APPLY & DEPLOY (merge to main only)
  # =================================================================
  # Runs only on pushes to main (i.e., after a PR is merged).
  # Depends on both the matrix build (all tests pass) AND the
  # build-deploy job (JAR artifact is ready).
  # =================================================================
  deploy:
    name: Deploy to Cloud Foundry
    runs-on: ubuntu-latest
    needs: [build-matrix, build-deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://github-action-demo-86d1d2ddtrial.cfapps.ap21.hana.ondemand.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: backend/target/

      - name: Verify JAR exists
        run: |
          ls -la backend/target/
          echo "JAR file: backend/target/${{ env.JAR_NAME }}"
          test -f "backend/target/${{ env.JAR_NAME }}" || { echo "ERROR: JAR not found!"; exit 1; }

      - name: Restore Terraform state
        run: |
          git fetch origin terraform-state --depth=1
          git show origin/terraform-state:terraform.tfstate > terraform/terraform.tfstate 2>/dev/null || echo "No existing state — fresh apply"
          if [ -f terraform/terraform.tfstate ]; then
            echo "State file restored ($(wc -c < terraform/terraform.tfstate) bytes)"
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build -- --configuration production
          cp Staticfile dist/frontend/browser/Staticfile

      - name: Verify frontend build exists
        run: |
          ls -la frontend/dist/frontend/browser/
          test -f "frontend/dist/frontend/browser/index.html" || { echo "ERROR: frontend index.html not found"; exit 1; }
          test -f "frontend/dist/frontend/browser/Staticfile" || { echo "ERROR: frontend Staticfile not found"; exit 1; }

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -var="cf_username=${{ secrets.CF_USERNAME }}" \
            -var="cf_password=${{ secrets.CF_PASSWORD }}" \
            -input=false \
            -auto-approve
        env:
          TF_IN_AUTOMATION: true

      - name: Save Terraform state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin terraform-state --depth=1
          git worktree add /tmp/tf-state origin/terraform-state

          cp terraform/terraform.tfstate /tmp/tf-state/terraform.tfstate

          cd /tmp/tf-state
          if git diff --quiet; then
            echo "No state changes to commit"
          else
            git add terraform.tfstate
            git commit -m "chore: update terraform state [skip ci]"
            git push origin HEAD:terraform-state
            echo "State pushed to terraform-state branch"
          fi

          cd -
          git worktree remove /tmp/tf-state

      - name: Verify deployment
        run: |
          echo "=== Terraform Outputs ==="
          cd terraform && terraform output

          echo ""
          echo "=== Health Check ==="
          APP_URL="https://github-action-demo-86d1d2ddtrial.cfapps.ap21.hana.ondemand.com"
          
          sleep 10

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/actuator/health" || true)
          echo "Health endpoint status: $HTTP_STATUS"

          RESPONSE=$(curl -s "$APP_URL/api/hello" || true)
          echo "Hello endpoint response: $RESPONSE"

          FRONTEND_URL="https://github-action-frontend-86d1d2ddtrial.cfapps.ap21.hana.ondemand.com"
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL" || true)
          echo "Frontend endpoint status: $FRONTEND_STATUS"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo ""
            echo "Deployment successful!"
            echo "  App URL: $APP_URL"
            echo "  Frontend URL: $FRONTEND_URL"
          else
            echo ""
            echo "Health check returned $HTTP_STATUS — app may still be starting"
          fi
