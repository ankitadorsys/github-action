<section class="panel">
  <div class="panel-header">
    <h1>Tasks</h1>
    <a routerLink="/tasks/new">Create task</a>
  </div>

  @if (loading) {
    <p>Loading tasks...</p>
  } @else if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  } @else if (tasks.length === 0) {
    <p>No tasks yet.</p>
  } @else {
    <ul>
      @for (task of tasks; track task.id) {
        <li>
          <a [routerLink]="['/tasks', task.id]">{{ task.title }}</a>
          <span class="badge" [class]="'badge status ' + statusClass(task.status)">
            {{ task.status }}
          </span>
          <span class="badge" [class]="'badge priority ' + priorityClass(task.priority)">
            {{ task.priority }}
          </span>
        </li>
      }
    </ul>
  }
</section>
