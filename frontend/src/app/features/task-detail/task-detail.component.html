<section class="panel">
  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  } @else if (!task) {
    <p>Loading task details...</p>
  } @else {
    <h1>{{ task.title }}</h1>
    <p>{{ task.description || 'No description.' }}</p>

    <div class="meta">
      <span>{{ task.status }}</span>
      <span>{{ task.priority }}</span>
    </div>
  }
</section>
